<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Хватайка</title>
  <style>
    :root{
      --ui-bg: rgba(8,16,32,.72);
      --ui-border: rgba(255,255,255,.16);
      --ui-text: #eef4ff;
      --glass: rgba(255,255,255,.08);
      --shadow: 0 14px 40px rgba(0,0,0,.28);
      --machine-w: min(92vw, 980px);
      --machine-h: min(78vh, 720px);
      --machine-base: #ff5b74;
      --machine-mid: #d83047;
      --machine-dark: #ad1e33;
      --machine-deep: #7d1627;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: Arial, Helvetica, sans-serif;
      background:transparent;
      color:var(--ui-text);
      overflow:hidden;
    }

    .game{
      position:relative;
      width:100vw;
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      background:transparent;
    }

    .machine{
      position:relative;
      width:var(--machine-w);
      height:var(--machine-h);
      min-height:560px;
      border-radius:30px;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,0) 16%),
        linear-gradient(180deg, rgba(120,170,255,.22), rgba(26,36,66,.16) 48%, rgba(20,24,42,.18) 100%),
        linear-gradient(180deg, var(--machine-base) 0%, var(--machine-mid) 26%, var(--machine-dark) 48%, var(--machine-deep) 100%);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:
        0 20px 50px rgba(0,0,0,.28),
        inset 0 1px 0 rgba(255,255,255,.22);
    }

    .machine::before{
      content:"";
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.09), rgba(255,255,255,0) 14%, rgba(255,255,255,0) 86%, rgba(255,255,255,.08)),
        linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,0));
      z-index:0;
    }

    .machineInnerFrame{
      position:absolute;
      inset:10px;
      border-radius:24px;
      border:1px solid rgba(255,255,255,.16);
      pointer-events:none;
      z-index:1;
      box-shadow: inset 0 0 0 2px rgba(70,0,14,.18);
    }

    .topbar{
      position:absolute;
      inset:14px 14px auto 14px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      z-index:30;
      flex-wrap:wrap;
    }

    .panel{
      display:flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:14px;
      background:var(--ui-bg);
      border:1px solid var(--ui-border);
      backdrop-filter: blur(8px);
      box-shadow: var(--shadow);
    }

    .panel strong{font-size:14px}

    .timerValue{
      display:inline-flex;
      min-width:52px;
      justify-content:center;
      font-weight:800;
      color:#fff;
    }

    .status{
      font-size:14px;
      opacity:.95;
    }

    .coinBtn{
      appearance:none;
      border:none;
      cursor:pointer;
      padding:12px 16px;
      border-radius:14px;
      background: linear-gradient(180deg,#ffe27a,#ffb937);
      color:#3a2500;
      font-weight:800;
      box-shadow: 0 8px 20px rgba(255,185,55,.35);
    }

    .coinBtn:disabled{
      opacity:.55;
      cursor:not-allowed;
      filter:grayscale(.1);
    }

    .playfieldWrap{
      position:absolute;
      inset:70px 18px 112px 18px;
      border-radius:24px;
      z-index:5;
      overflow:hidden;
      background:
        linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,0)),
        linear-gradient(180deg, rgba(16,22,46,.14), rgba(16,22,46,.22));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.15),
        inset 0 18px 32px rgba(255,255,255,.06);
    }

    .playfield{
      position:absolute;
      inset:0;
      border-radius:24px;
      overflow:hidden;
      background:
        radial-gradient(480px 170px at 50% 4%, rgba(255,255,255,.32), transparent 75%),
        linear-gradient(180deg, rgba(170,226,255,.36), rgba(118,187,255,.12) 44%, rgba(9,14,28,.22) 45%, rgba(9,14,28,.24)),
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(255,255,255,0));
      border:1px solid rgba(255,255,255,.16);
    }

    .playfieldGlow{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        radial-gradient(circle at 18% 18%, rgba(104,222,255,.20), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(123,174,255,.18), transparent 24%),
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.15), transparent 32%);
      z-index:1;
    }

    .glassShine{
      position:absolute;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(111deg, rgba(255,255,255,.22) 0%, rgba(255,255,255,0) 16%, rgba(255,255,255,.07) 31%, rgba(255,255,255,0) 49%),
        linear-gradient(76deg, rgba(255,255,255,.08) 0%, rgba(255,255,255,0) 18%, rgba(255,255,255,.03) 26%, rgba(255,255,255,0) 38%);
      z-index:12;
    }

    .glassReflections{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:13;
    }

    .glassReflections::before,
    .glassReflections::after{
      content:"";
      position:absolute;
      top:0;
      bottom:0;
      width:16%;
      filter: blur(.2px);
      opacity:.28;
    }

    .glassReflections::before{
      left:6%;
      background: linear-gradient(90deg, rgba(255,255,255,.18), rgba(255,255,255,0));
      transform: skewX(-10deg);
    }

    .glassReflections::after{
      right:8%;
      background: linear-gradient(90deg, rgba(255,255,255,0), rgba(255,255,255,.13));
      transform: skewX(-12deg);
    }

    .ceilingRail{
      position:absolute;
      left:8%;
      right:8%;
      top:28px;
      height:10px;
      border-radius:999px;
      background: linear-gradient(180deg, #dce6ff, #93a4d6);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.6),
        inset 0 -2px 3px rgba(0,0,0,.16),
        0 3px 8px rgba(0,0,0,.18);
      z-index:14;
    }

    .innerLights{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:6;
    }

    .innerLights::before,
    .innerLights::after{
      content:"";
      position:absolute;
      top:12px;
      width:12px;
      bottom:12px;
      border-radius:999px;
      opacity:.75;
      animation: sideGlow 2.2s ease-in-out infinite alternate;
    }

    .innerLights::before{
      left:10px;
      background: repeating-linear-gradient(180deg, rgba(92,233,255,.95) 0 8px, rgba(92,233,255,.15) 8px 18px);
      box-shadow: 0 0 10px rgba(92,233,255,.45);
    }

    .innerLights::after{
      right:10px;
      background: repeating-linear-gradient(180deg, rgba(255,150,205,.95) 0 8px, rgba(255,150,205,.15) 8px 18px);
      box-shadow: 0 0 10px rgba(255,150,205,.42);
      animation-delay:.5s;
    }

    @keyframes sideGlow{
      from{ opacity:.45; filter:brightness(.92); }
      to{ opacity:.9; filter:brightness(1.18); }
    }

    .dropZoneWrap{
      position:absolute;
      right:48px;
      bottom:34px;
      width:86px;
      height:86px;
      z-index:7;
      pointer-events:none;
    }

    .dropFrameGlow{ display:none; }

    .dropZone{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0) 58%, rgba(0,0,0,.18) 72%, rgba(0,0,0,.34) 100%),
        linear-gradient(145deg, #e7edf8 0%, #bcc8dc 22%, #7f8faa 45%, #d6deec 64%, #6a788f 82%, #4d5869 100%);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.85),
        inset 0 -3px 6px rgba(0,0,0,.35),
        0 1px 5px rgba(0,0,0,.28);
      overflow:hidden;
      z-index:7;
    }

    .dropZone::before{
      content:"";
      position:absolute;
      inset:7px;
      border-radius:50%;
      background:
        linear-gradient(145deg, rgba(255,255,255,.55), rgba(255,255,255,.08) 28%, rgba(0,0,0,.14) 62%, rgba(255,255,255,.22) 100%);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.45),
        inset 0 -2px 3px rgba(0,0,0,.22);
      pointer-events:none;
      z-index:0;
    }

    .dropTopLip,.dropDepth,.dropBulbs{ display:none; }

    .dropHole{
      position:absolute;
      inset:12px;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 20%, rgba(255,255,255,.05) 0 6%, rgba(255,255,255,0) 14%),
        radial-gradient(circle at 50% 30%, #341c12 0%, #1f1009 16%, #100805 36%, #050202 64%, #000000 100%);
      box-shadow:
        inset 0 12px 16px rgba(255,255,255,.03),
        inset 0 -30px 34px rgba(0,0,0,.92),
        inset 0 0 30px rgba(0,0,0,.46);
      z-index:1;
      pointer-events:none;
    }

    .dropHole::before{
      content:"";
      position:absolute;
      left:14%;
      top:14%;
      width:72%;
      height:72%;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 35%, rgba(58,30,18,.35) 0%, rgba(14,7,4,.16) 34%, rgba(0,0,0,.10) 54%, rgba(0,0,0,0) 72%);
      pointer-events:none;
    }

    .dropHole::after{
      content:"";
      position:absolute;
      left:24%;
      top:24%;
      width:52%;
      height:52%;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 40%, #0c0503 0%, #020101 50%, #000000 100%);
      box-shadow:
        inset 0 8px 10px rgba(255,255,255,.01),
        inset 0 -14px 18px rgba(0,0,0,.96);
      pointer-events:none;
    }

    .clawRig{
      position:absolute;
      top:18px;
      left:50%;
      transform:translateX(-50%);
      width:110px;
      height:420px;
      z-index:18;
      pointer-events:none;
    }

    .clawHead{
      position:absolute;
      left:50%;
      top:0;
      transform:translateX(-50%);
      width:72px;
      height:34px;
      border-radius:12px;
      background: linear-gradient(180deg, #f8fbff, #a9b9df);
      box-shadow: inset 0 2px 2px rgba(255,255,255,.7), inset 0 -3px 5px rgba(0,0,0,.14);
    }

    .cable{
      position:absolute;
      left:50%;
      top:30px;
      transform:translateX(-50%);
      width:4px;
      height:130px;
      background: linear-gradient(180deg, #f4f7ff, #9aa9d0);
      border-radius:999px;
    }

    .claw{
      position:absolute;
      left:50%;
      top:150px;
      transform:translateX(-50%);
      width:100px;
      height:124px;
      transform-origin: top center;
      transition: transform .18s ease;
      --toy-gap: 42px;
    }

    .clawCore{
      position:absolute;
      left:50%;
      top:8px;
      transform:translateX(-50%);
      width:24px;
      height:30px;
      border-radius:8px;
      background: linear-gradient(180deg, #ffffff, #9fb2dd);
      box-shadow: inset 0 2px 2px rgba(255,255,255,.7), inset 0 -3px 5px rgba(0,0,0,.12);
      z-index:4;
    }

    .clawStem{
      position:absolute;
      left:50%;
      top:34px;
      transform:translateX(-50%);
      width:8px;
      height:16px;
      border-radius:999px;
      background: linear-gradient(180deg, #f8fbff, #a8b9de);
      z-index:4;
    }

    .prong{
      position:absolute;
      top:40px;
      width:34px;
      height:68px;
      transform-origin: top center;
      transition: transform .18s ease, left .18s ease, right .18s ease;
      z-index:2;
      filter:none;
      overflow:visible;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
      transform-style:preserve-3d;
    }

    .prong::before{
      content:"";
      position:absolute;
      inset:0;
      border:6px solid #dfe8ff;
      background: transparent;
      box-shadow:none;
      outline:none;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }

    .prong::after{
      content:"";
      position:absolute;
      top:-3px;
      width:15px;
      height:11px;
      background: linear-gradient(180deg, #eef4ff, #cad7f0);
      border-radius:7px 7px 3px 3px;
      box-shadow:none;
      backface-visibility:hidden;
      -webkit-backface-visibility:hidden;
    }

    .prong.left{ left:6px; transform:rotate(22deg) translateZ(0); }
    .prong.left::before{
      border-right:none;
      border-radius:32px 0 0 32px;
    }
    .prong.left::after{ right:-8px; }

    .prong.right{ right:6px; transform:rotate(-22deg) translateZ(0); }
    .prong.right::before{
      border-left:none;
      border-radius:0 32px 32px 0;
    }
    .prong.right::after{ left:-8px; }

    .claw.closed .prong.left{
      left:19px;
      transform:rotate(7deg) translateX(3px) translateZ(0);
    }

    .claw.closed .prong.right{
      right:19px;
      transform:rotate(-7deg) translateX(-3px) translateZ(0);
    }

    .claw.hasToy.closed .prong.left{
      left: calc((100px - var(--toy-gap)) / 2 - 17px);
      transform:rotate(15deg) translateZ(0);
    }

    .claw.hasToy.closed .prong.right{
      right: calc((100px - var(--toy-gap)) / 2 - 17px);
      transform:rotate(-15deg) translateZ(0);
    }

    .claw.swing-left{ transform:translateX(-50%) rotate(-4deg); }
    .claw.swing-right{ transform:translateX(-50%) rotate(4deg); }

    .toyArea{
      position:absolute;
      left:5%;
      right:22%;
      bottom:7%;
      top:55%;
      z-index:10;
    }

    .toy{
      position:absolute;
      width:70px;
      height:70px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:34px;
      font-weight:700;
      color:#fff;
      box-shadow: 0 10px 20px rgba(0,0,0,.22);
      border:2px solid rgba(255,255,255,.55);
      user-select:none;
      transition: transform .25s ease, opacity .25s ease;
      z-index:10;
    }

    .toy.caught{ transform: scale(.95); }
    .toy.hidden{ opacity:0; pointer-events:none; }
    .toy.dropForeground{ z-index:40; }

    .basePanel{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      height:82px;
      border-radius:22px;
      z-index:20;
      background:
        linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,0) 16%),
        linear-gradient(180deg, var(--machine-base) 0%, var(--machine-mid) 40%, var(--machine-deep) 100%);
      border:1px solid rgba(255,255,255,.18);
      box-shadow:
        inset 0 2px 2px rgba(255,255,255,.18),
        inset 0 -10px 14px rgba(0,0,0,.18),
        0 8px 18px rgba(0,0,0,.24);
      overflow:hidden;
    }

    .basePanel::before{
      content:"";
      position:absolute;
      left:16px;
      right:16px;
      top:4px;
      height:8px;
      border-radius:999px;
      background: rgba(255,255,255,.14);
    }

    .baseChrome{
      position:absolute;
      left:22px;
      right:22px;
      top:16px;
      height:10px;
      border-radius:999px;
      background: linear-gradient(180deg, #f6f9ff, #adb9d5);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.78),
        0 1px 3px rgba(0,0,0,.16);
    }

    .baseSpeaker{
      position:absolute;
      top:26px;
      width:78px;
      height:42px;
      border-radius:14px;
      background: linear-gradient(180deg, rgba(255,255,255,.18), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.12);
      box-shadow: inset 0 6px 10px rgba(0,0,0,.18);
    }

    .baseSpeaker.left{ left:18px; }
    .baseSpeaker.right{ right:18px; }

    .baseSpeaker::before{
      content:"";
      position:absolute;
      inset:10px 12px;
      background: radial-gradient(circle, rgba(255,255,255,.14) 1px, transparent 1.5px);
      background-size: 8px 8px;
      opacity:.95;
    }

    .baseControls{
      position:absolute;
      left:50%;
      top:24px;
      transform:translateX(-50%);
      width:min(52%, 420px);
      min-width:260px;
      height:44px;
      border-radius:12px;
      background: linear-gradient(180deg, #1b2238, #0e1423);
      box-shadow:
        inset 0 4px 6px rgba(0,0,0,.48),
        0 1px 0 rgba(255,255,255,.08);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:0 14px;
      color:#dce7ff;
      font-size:13px;
      font-weight:700;
      text-align:center;
      line-height:1.2;
      white-space:normal;
      gap:10px;
    }

    .baseControls.touchMode{
      justify-content:center;
      gap:12px;
    }

    .touchBtn{
      appearance:none;
      border:none;
      width:44px;
      height:44px;
      border-radius:12px;
      cursor:pointer;
      font-size:20px;
      font-weight:900;
      color:#fff;
      background: rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.14);
      box-shadow:
        inset 0 1px 1px rgba(255,255,255,.08),
        0 4px 10px rgba(0,0,0,.16);
      flex:0 0 auto;
    }

    .touchBtn:active{
      transform: translateY(1px);
    }

    .overlay{
      position:absolute;
      inset:0;
      display:none;
      align-items:center;
      justify-content:center;
      z-index:50;
      background: rgba(6,10,20,.35);
      padding:20px;
    }

    .overlay.show{ display:flex; }

    .card{
      position:relative;
      width:min(92vw, 700px);
      min-height:360px;
      border-radius:24px;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(240,246,255,.96));
      color:#1e2740;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
      overflow:hidden;
      border:1px solid rgba(255,255,255,.7);
    }

    .cardClose{
      position:absolute;
      right:12px;
      top:12px;
      width:38px;
      height:38px;
      border:none;
      border-radius:999px;
      cursor:pointer;
      font-size:22px;
      font-weight:900;
      background:#ff6e8f;
      color:white;
      z-index:4;
    }

    .cardFlipWrap{
      position:relative;
      width:100%;
      min-height:360px;
      perspective:1200px;
      cursor:pointer;
    }

    .cardInner{
      position:relative;
      width:100%;
      min-height:360px;
      transition: transform .7s ease;
      transform-style: preserve-3d;
    }

    .card.flipped .cardInner{ transform: rotateY(180deg); }

    .cardFace{
      position:absolute;
      inset:0;
      padding:56px 24px 24px;
      backface-visibility:hidden;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      text-align:center;
      gap:18px;
      overflow:hidden;
    }

    .cardBack{
      transform: rotateY(180deg);
      background: linear-gradient(180deg, #eef7ff, #ffffff);
    }

    .cardTitle{
      font-size:18px;
      font-weight:800;
      opacity:.7;
      flex:0 0 auto;
    }

    .cardContent{
      width:100%;
      flex:1 1 auto;
      min-height:0;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      overflow:hidden;
    }

    .cardTextWrap{
      width:100%;
      flex:1 1 auto;
      min-height:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
      padding:0 6px;
    }

    .cardText{
      font-size: clamp(22px, 3vw, 34px);
      font-weight:800;
      line-height:1.25;
      white-space:pre-wrap;
      word-break:break-word;
      overflow-wrap:anywhere;
      margin:0;
      max-width:100%;
      display:block;
    }

    .cardSub{
      font-size:14px;
      opacity:.65;
      font-weight:700;
      flex:0 0 auto;
    }

    .cardImage{
      max-width:min(86%, 340px);
      max-height:220px;
      object-fit:contain;
      border-radius:18px;
      box-shadow: 0 12px 24px rgba(0,0,0,.12);
      flex:0 1 auto;
    }

    .finish{
      width:min(90vw, 760px);
      padding:38px 24px;
      border-radius:28px;
      text-align:center;
      background: linear-gradient(180deg, rgba(255,255,255,.96), rgba(238,245,255,.96));
      color:#13203c;
      box-shadow: 0 24px 60px rgba(0,0,0,.35);
    }

    .finishText{
      font-size: clamp(34px, 6vw, 78px);
      font-weight:900;
      line-height:1.05;
      margin-bottom:12px;
    }

    .finishSub{
      font-size: clamp(16px, 2vw, 24px);
      opacity:.75;
      font-weight:700;
    }

    .flashMessage{
      position:absolute;
      left:50%;
      top:26%;
      transform:translate(-50%, -50%);
      z-index:40;
      padding:12px 18px;
      border-radius:14px;
      background: rgba(255,85,120,.92);
      color:white;
      font-weight:900;
      box-shadow: 0 14px 40px rgba(0,0,0,.28);
      display:none;
    }

    .flashMessage.show{ display:block; }

    @media (max-width: 800px){
      .machine{ min-height:560px; }
      .toy{
        width:58px;
        height:58px;
        font-size:28px;
      }
      .dropZoneWrap{
        width:72px;
        height:72px;
        right:42px;
        bottom:30px;
      }
      .clawRig{
        top:10px;
        height:400px;
      }
      .cable{ height:122px; }
      .claw{ top:142px; }
      .prong.left{ left:10px; }
      .prong.right{ right:10px; }
      .prong.left::after{ right:-7px; }
      .prong.right::after{ left:-7px; }
      .claw.closed .prong.left{ left:20px; }
      .claw.closed .prong.right{ right:20px; }
      .toyArea{ top:57%; }
      .baseSpeaker{ width:64px; }
      .baseControls{
        width:min(52%, 330px);
        min-width:180px;
        font-size:11px;
        padding:0 10px;
        height:46px;
      }
      .touchBtn{
        width:42px;
        height:42px;
        font-size:18px;
      }
      .cardImage{
        max-height:180px;
      }
    }
  </style>
</head>
<body>
  <div class="game">
    <div class="machine" id="machine">
      <div class="machineInnerFrame"></div>

      <div class="topbar">
        <div class="panel">
          <strong id="labelTimer">Время:</strong>
          <span class="timerValue" id="timerValue">5.0</span>
        </div>

        <div class="panel status" id="statusText"></div>

        <button class="coinBtn" id="coinBtn"></button>
      </div>

      <div class="playfieldWrap">
        <div class="playfield" id="playfield">
          <div class="playfieldGlow"></div>
          <div class="innerLights"></div>
          <div class="glassShine"></div>
          <div class="glassReflections"></div>
          <div class="ceilingRail"></div>

          <div class="dropZoneWrap">
            <div class="dropFrameGlow"></div>
            <div class="dropZone" id="dropZone">
              <div class="dropTopLip"></div>
              <div class="dropDepth"></div>
              <div class="dropHole"></div>
              <div class="dropBulbs">
                <span></span><span></span><span></span><span></span>
                <span></span><span></span><span></span><span></span>
              </div>
            </div>
          </div>

          <div class="clawRig" id="clawRig">
            <div class="clawHead"></div>
            <div class="cable" id="cable"></div>
            <div class="claw" id="claw">
              <div class="clawCore"></div>
              <div class="clawStem"></div>
              <div class="prong left"></div>
              <div class="prong right"></div>
            </div>
          </div>

          <div class="toyArea" id="toyArea"></div>
        </div>
      </div>

      <div class="basePanel">
        <div class="baseChrome"></div>
        <div class="baseSpeaker left"></div>
        <div class="baseSpeaker right"></div>
        <div class="baseControls" id="controlsHint"></div>
      </div>

      <div class="flashMessage" id="flashMessage">Промах!</div>

      <div class="overlay" id="cardOverlay">
        <div class="card" id="taskCard">
          <button class="cardClose" id="closeCard">×</button>
          <div class="cardFlipWrap" id="flipCard">
            <div class="cardInner">
              <div class="cardFace cardFront" id="cardFront"></div>
              <div class="cardFace cardBack" id="cardBack"></div>
            </div>
          </div>
        </div>
      </div>

      <div class="overlay" id="finishOverlay">
        <div class="finish">
          <div class="finishText" id="finishText">You did it!</div>
          <div class="finishSub" id="finishSub">Все игрушки собраны</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const DEFAULT_LANG = {
      timer: "Время:",
      coinButton: "🪙 Бросить монетку",
      statusIdle: "Бросьте монетку, затем двигайте клешню стрелками и нажмите пробел",
      statusActive: "У вас есть время, чтобы поймать игрушку",
      statusDropping: "Клешня опускается...",
      statusCard: "Нажмите на карточку, чтобы перевернуть её",
      statusMiss: "Промах! Бросьте монетку снова",
      statusTimeout: "Время вышло! Бросьте монетку снова",
      controlsHint: "← → двигать клешню • Пробел — опустить клешню",
      controlsHintTouch: "Кнопки внизу: влево • вниз • вправо",
      cardFrontTitle: "Задание",
      cardBackTitle: "Ответ",
      cardFlipHint: "Нажмите на карточку, чтобы увидеть обратную сторону",
      finishTitle: "You did it!",
      finishSubtitle: "Все игрушки собраны",
      touchLeft: "←",
      touchDrop: "↓",
      touchRight: "→"
    };

    function decodeConfigFromUrl(){
      const params = new URLSearchParams(window.location.search);
      const raw = params.get('config');
      if(!raw) return null;
      try{
        const json = decodeURIComponent(escape(atob(decodeURIComponent(raw))));
        return JSON.parse(json);
      }catch(e){
        console.error('Ошибка декодирования config:', e);
        return null;
      }
    }

    function hexToRgb(hex){
      const value = hex.replace('#','');
      const full = value.length === 3 ? value.split('').map(c => c + c).join('') : value;
      const num = parseInt(full, 16);
      return {
        r: (num >> 16) & 255,
        g: (num >> 8) & 255,
        b: num & 255
      };
    }

    function shadeColor(hex, factor){
      const { r, g, b } = hexToRgb(hex);
      const nr = Math.max(0, Math.min(255, Math.round(r * factor)));
      const ng = Math.max(0, Math.min(255, Math.round(g * factor)));
      const nb = Math.max(0, Math.min(255, Math.round(b * factor)));
      return `rgb(${nr}, ${ng}, ${nb})`;
    }

    const incomingConfig = decodeConfigFromUrl() || {
      machineColor: "#ff5b74",
      fontFamily: "Arial, Helvetica, sans-serif",
      touchControls: false,
      lang: DEFAULT_LANG,
      items: [
        {
          emoji: "🧸",
          color: "#ff7b8e",
          front: { type: "text", text: "", image: "" },
          back: { type: "text", text: "", image: "" }
        },
        {
          emoji: "🚗",
          color: "#57b8ff",
          front: { type: "text", text: "", image: "" },
          back: { type: "text", text: "", image: "" }
        },
        {
          emoji: "⚽",
          color: "#67d38c",
          front: { type: "text", text: "", image: "" },
          back: { type: "text", text: "", image: "" }
        }
      ]
    };

    if(Array.isArray(incomingConfig.items)){
      incomingConfig.items = incomingConfig.items.slice(0, 12);
    }

    const machineBase = incomingConfig.machineColor || "#ff5b74";
    document.documentElement.style.setProperty('--machine-base', machineBase);
    document.documentElement.style.setProperty('--machine-mid', shadeColor(machineBase, 0.82));
    document.documentElement.style.setProperty('--machine-dark', shadeColor(machineBase, 0.62));
    document.documentElement.style.setProperty('--machine-deep', shadeColor(machineBase, 0.48));
    document.body.style.fontFamily = incomingConfig.fontFamily || "Arial, Helvetica, sans-serif";

    const GAME_CONFIG = {
      lang: Object.assign({}, DEFAULT_LANG, incomingConfig.lang || {}),
      timerSeconds: 5,
      moveStep: 26,
      clawMinXPercent: 12,
      clawMaxXPercent: 76,
      toyCount: Math.min(12, (incomingConfig.items || []).length),
      clawStartTop: 150,
      clawTopMin: 150,
      clawCatchOffsetY: 116,
      touchControls: !!incomingConfig.touchControls,
      items: (incomingConfig.items || []).slice(0, 12)
    };

    const state = {
      active: false,
      dropping: false,
      currentXPercent: 50,
      currentClawTop: GAME_CONFIG.clawStartTop,
      timerLeft: GAME_CONFIG.timerSeconds,
      timerInterval: null,
      toys: [],
      currentCardToy: null,
      completed: false,
      swingTimeout: null,
      carriedToyOffsetX: 0,
      carriedToyOffsetY: 0
    };

    const toyArea = document.getElementById('toyArea');
    const clawRig = document.getElementById('clawRig');
    const claw = document.getElementById('claw');
    const cable = document.getElementById('cable');
    const timerValue = document.getElementById('timerValue');
    const coinBtn = document.getElementById('coinBtn');
    const statusText = document.getElementById('statusText');
    const flashMessage = document.getElementById('flashMessage');
    const cardOverlay = document.getElementById('cardOverlay');
    const taskCard = document.getElementById('taskCard');
    const flipCard = document.getElementById('flipCard');
    const closeCard = document.getElementById('closeCard');
    const cardFront = document.getElementById('cardFront');
    const cardBack = document.getElementById('cardBack');
    const finishOverlay = document.getElementById('finishOverlay');
    const finishText = document.getElementById('finishText');
    const finishSub = document.getElementById('finishSub');
    const controlsHint = document.getElementById('controlsHint');
    const labelTimer = document.getElementById('labelTimer');

    function escapeHTML(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'","&#39;");
    }

    function escapeAttr(s){
      return String(s)
        .replaceAll('&','&amp;')
        .replaceAll('"','&quot;')
        .replaceAll('<','&lt;');
    }

    function renderBottomControls(){
      if(!GAME_CONFIG.touchControls){
        controlsHint.classList.remove('touchMode');
        controlsHint.textContent = GAME_CONFIG.lang.controlsHint;
        return;
      }

      controlsHint.classList.add('touchMode');
      controlsHint.innerHTML = `
        <button class="touchBtn" id="touchLeft">${escapeHTML(GAME_CONFIG.lang.touchLeft)}</button>
        <button class="touchBtn" id="touchDrop">${escapeHTML(GAME_CONFIG.lang.touchDrop)}</button>
        <button class="touchBtn" id="touchRight">${escapeHTML(GAME_CONFIG.lang.touchRight)}</button>
      `;

      document.getElementById('touchLeft').addEventListener('click', function(){ moveClaw(-1); });
      document.getElementById('touchRight').addEventListener('click', function(){ moveClaw(1); });
      document.getElementById('touchDrop').addEventListener('click', function(){ dropClaw(); });
    }

    function applyLang(){
      labelTimer.textContent = GAME_CONFIG.lang.timer;
      coinBtn.textContent = GAME_CONFIG.lang.coinButton;
      statusText.textContent = GAME_CONFIG.lang.statusIdle;
      flashMessage.textContent = GAME_CONFIG.lang.statusMiss;
      finishText.textContent = GAME_CONFIG.lang.finishTitle;
      finishSub.textContent = GAME_CONFIG.lang.finishSubtitle;
      renderBottomControls();
    }

    function showFlash(text){
      flashMessage.textContent = text;
      flashMessage.classList.add('show');
      setTimeout(() => flashMessage.classList.remove('show'), 1200);
    }

    function setStatus(text){
      statusText.textContent = text;
    }

    function updateClawPosition(){
      clawRig.style.left = state.currentXPercent + '%';
      const cableHeight = Math.max(40, state.currentClawTop - 20);
      cable.style.height = cableHeight + 'px';
      claw.style.top = state.currentClawTop + 'px';
    }

    function clearSwingClasses(){
      claw.classList.remove('swing-left', 'swing-right');
    }

    function animateClawSwing(dir){
      clearTimeout(state.swingTimeout);
      claw.classList.remove(dir < 0 ? 'swing-right' : 'swing-left');
      claw.classList.add(dir < 0 ? 'swing-left' : 'swing-right');
      state.swingTimeout = setTimeout(clearSwingClasses, 180);
    }

    function resetClawVisual(){
      state.currentClawTop = GAME_CONFIG.clawStartTop;
      state.carriedToyOffsetX = 0;
      state.carriedToyOffsetY = 0;
      claw.classList.remove('closed', 'hasToy');
      claw.style.removeProperty('--toy-gap');
      clearSwingClasses();
      updateClawPosition();
    }

    function mulberry32(a){
      return function(){
        let t = a += 0x6D2B79F5;
        t = Math.imul(t ^ (t >>> 15), t | 1);
        t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
        return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
      };
    }

    function buildToyPositions(count){
      const toySize = window.innerWidth <= 800 ? 58 : 70;
      const areaRect = toyArea.getBoundingClientRect();
      const width = areaRect.width || 700;
      const height = areaRect.height || 220;

      const radius = toySize / 2;
      const minX = radius + 8;
      const maxX = width - radius - 8;
      const minY = radius + 4;
      const maxY = height - radius - 26;

      const positions = [];
      const rand = mulberry32(12345 + count * 77);

      const minDist = toySize * 0.92;
      const maxAttempts = 4000;

      let attempts = 0;
      while(positions.length < count && attempts < maxAttempts){
        attempts++;

        const x = minX + rand() * (maxX - minX);
        const y = minY + rand() * (maxY - minY);

        let intersects = false;
        for(const p of positions){
          const dx = x - p.xPx;
          const dy = y - p.yPx;
          if(Math.sqrt(dx * dx + dy * dy) < minDist){
            intersects = true;
            break;
          }
        }

        if(!intersects){
          positions.push({
            xPx: x,
            yPx: y,
            x: (x / width) * 100,
            y: (y / height) * 100
          });
        }
      }

      if(positions.length < count){
        const fallback = [
          { x: 14, y: 22 }, { x: 31, y: 18 }, { x: 50, y: 24 }, { x: 67, y: 20 },
          { x: 22, y: 44 }, { x: 40, y: 39 }, { x: 58, y: 46 }, { x: 75, y: 42 },
          { x: 16, y: 63 }, { x: 35, y: 60 }, { x: 54, y: 66 }, { = p < 0.45 ? 3.5 * p * p * p : 1 - Math.pow(-2 * p + 2, 3) / 2;
        const x = stage1X + (holeX - stage1X) * ease;
        const y = stage1Y + (holeY - stage1Y) * ease;
        const scale = 0.95 - p * 0.62;
        toy.el.style.left = x + 'px';
        toy.el.style.top = y + 'px';
        toy.el.style.transform = 'scale(' + scale + ')';
        await delay(16);
      }

      toy.el.classList.remove('dropForeground');
      await animateClawUp();
    }

    function hasVisibleText(value){
      return String(value || '').trim().length > 0;
    }

    function createTextBlock(text){
      return '<div class="cardTextWrap"><div class="cardText autoFitText">' + escapeHTML(text) + '</div></div>';
    }

    function renderCardSide(side, title){
      const type = side?.type || 'text';
      const text = side?.text || '';
      const image = side?.image || '';
      const hasText = hasVisibleText(text);
      const hasImage = !!image;

      let html = '<div class="cardTitle">' + escapeHTML(title) + '</div>';
      html += '<div class="cardContent">';

      if(type === 'text'){
        if(hasText){
          html += createTextBlock(text);
        }
      } else if(type === 'image'){
        if(hasImage){
          html += '<img class="cardImage" src="' + escapeAttr(image) + '" alt="">';
        }
      } else if(type === 'mixed'){
        if(hasImage){
          html += '<img class="cardImage" src="' + escapeAttr(image) + '" alt="">';
        }
        if(hasText){
          html += createTextBlock(text);
        }
      }

      html += '</div>';
      html += '<div class="cardSub">' + escapeHTML(GAME_CONFIG.lang.cardFlipHint) + '</div>';
      return html;
    }

    function fitTextToBox(element){
      const parent = element.parentElement;
      if(!parent) return;

      element.style.fontSize = '';
      let size = parseFloat(getComputedStyle(element).fontSize);
      const minSize = 12;

      while(size > minSize && (element.scrollHeight > parent.clientHeight || element.scrollWidth > parent.clientWidth)){
        size -= 1;
        element.style.fontSize = size + 'px';
      }
    }

    function fitAllCardTexts(){
      const texts = document.querySelectorAll('.autoFitText');
      texts.forEach(fitTextToBox);
    }

    function openCard(toy){
      state.currentCardToy = toy;
      taskCard.classList.remove('flipped');
      cardFront.innerHTML = renderCardSide(toy.item.front, GAME_CONFIG.lang.cardFrontTitle);
      cardBack.innerHTML = renderCardSide(toy.item.back, GAME_CONFIG.lang.cardBackTitle);
      cardOverlay.classList.add('show');
      setStatus(GAME_CONFIG.lang.statusCard);

      requestAnimationFrame(() => {
        fitAllCardTexts();
      });
    }

    function closeCurrentCard(){
      cardOverlay.classList.remove('show');
      state.currentCardToy = null;

      const remaining = state.toys.filter(t => !t.removed).length;
      if(remaining === 0){
        finishGame();
      } else {
        endRound();
        setStatus(GAME_CONFIG.lang.statusIdle);
      }
    }

    function finishGame(){
      state.completed = true;
      endRound();
      finishOverlay.classList.add('show');
      playTriumphSound();
    }

    function moveClaw(dir){
      if(!state.active || state.dropping || state.completed) return;
      const stepPercent = (GAME_CONFIG.moveStep / document.getElementById('playfield').clientWidth) * 100;
      state.currentXPercent += dir * stepPercent;
      state.currentXPercent = Math.max(GAME_CONFIG.clawMinXPercent, Math.min(GAME_CONFIG.clawMaxXPercent, state.currentXPercent));
      updateClawPosition();
      animateClawSwing(dir);
    }

    function delay(ms){
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    const AudioCtx = window.AudioContext || window.webkitAudioContext;
    let audioCtx = null;

    function ensureAudio(){
      if(!audioCtx) audioCtx = new AudioCtx();
      if(audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tone(freq, duration, type='sine', gainValue=.05, startAt=0){
      const now = audioCtx.currentTime + startAt;
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, now);
      gain.gain.setValueAtTime(0.0001, now);
      gain.gain.exponentialRampToValueAtTime(gainValue, now + 0.01);
      gain.gain.exponentialRampToValueAtTime(0.0001, now + duration);
      osc.connect(gain).connect(audioCtx.destination);
      osc.start(now);
      osc.stop(now + duration + 0.02);
    }

    function playSuccessSound(){
      ensureAudio();
      tone(523.25, .18, 'triangle', .06, 0);
      tone(659.25, .18, 'triangle', .06, .08);
      tone(783.99, .24, 'triangle', .06, .16);
    }

    function playFailSound(){
      ensureAudio();
      tone(240, .20, 'sawtooth', .05, 0);
      tone(180, .28, 'sawtooth', .05, .10);
    }

    function playTriumphSound(){
      ensureAudio();
      tone(523.25, .22, 'triangle', .07, 0);
      tone(659.25, .22, 'triangle', .07, .12);
      tone(783.99, .22, 'triangle', .07, .24);
      tone(1046.5, .45, 'triangle', .08, .36);
    }

    coinBtn.addEventListener('click', function(){
      ensureAudio();
      startRound();
    });

    document.addEventListener('keydown', function(e){
      if(cardOverlay.classList.contains('show')) return;
      if(finishOverlay.classList.contains('show')) return;

      if(e.code === 'ArrowLeft'){
        e.preventDefault();
        moveClaw(-1);
      } else if(e.code === 'ArrowRight'){
        e.preventDefault();
        moveClaw(1);
      } else if(e.code === 'Space'){
        e.preventDefault();
        dropClaw();
      }
    });

    flipCard.addEventListener('click', function(){
      taskCard.classList.toggle('flipped');
      requestAnimationFrame(() => {
        fitAllCardTexts();
      });
    });

    closeCard.addEventListener('click', function(e){
      e.stopPropagation();
      closeCurrentCard();
    });

    window.addEventListener('resize', function(){
      initToys();
      updateClawPosition();
      if(cardOverlay.classList.contains('show')){
        fitAllCardTexts();
      }
    });

    applyLang();
    initToys();
    updateClawPosition();
    timerValue.textContent = GAME_CONFIG.timerSeconds.toFixed(1);
  </script>
</body>
